<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>pred changer</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: black;
            color: lime;
            font-family: monospace;
            text-align: center;
        }
        .controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border: 2px solid lime;
            z-index: 1000;
            border-radius: 10px;
        }
        input, button {
            background: black;
            color: lime;
            border: 2px solid lime;
            padding: 10px 20px;
            font-size: 20px;
            margin: 5px;
            font-family: monospace;
        }
        button:hover {
            background: lime;
            color: black;
            cursor: pointer;
        }
        .fps {
            font-size: 30px;
            margin-top: 10px;
            text-shadow: 0 0 10px lime;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        .switch {
            display: inline-block;
            width: 80px;
            height: 40px;
            background: #222;
            border: 2px solid lime;
            border-radius: 20px;
            position: relative;
            vertical-align: middle;
            margin: 0 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .switch.on {
            background: lime;
        }
        .switch::before {
            content: "";
            position: absolute;
            width: 36px;
            height: 36px;
            background: lime;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s, background 0.2s;
        }
        .switch.on::before {
            transform: translateX(40px);
            background: black;
        }
        .status-text {
            font-size: 24px;
            vertical-align: middle;
            margin-left: 5px;
        }
        .control-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .rate-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="controls">
        <div class="control-row">
            <span class="status-text">OFF</span>
            <div id="powerSwitch" class="switch"></div>
            <span class="status-text">ON</span>
        </div>
        <div class="control-row">
            <input type="number" id="power" value="1000" min="1">
            <button id="enter">SET Prediction power</button>
        </div>
        <div class="rate-control">
            <input type="number" id="loopRate" value="90" min="1">
            <button id="setRate">SET Prediction rate</button>
        </div>
        <div class="fps" id="fps">FPS: -</div>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const powerInput = document.getElementById('power');
        const enterBtn = document.getElementById('enter');
        const loopRateInput = document.getElementById('loopRate');
        const setRateBtn = document.getElementById('setRate');
        const fpsDiv = document.getElementById('fps');
        const switchEl = document.getElementById('powerSwitch');
        
        let lagPower = 1000;
        let targetLoopRate = 90;
        let lastFrameTime = performance.now();
        let frameCount = 0;
        let lastFpsUpdate = performance.now();
        let fps = 60;
        let isOn = false;
        let animationFrame;
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        
        function updateFPS() {
            frameCount++;
            const now = performance.now();
            const delta = now - lastFpsUpdate;
            
            if (delta >= 1000) {
                fps = Math.round((frameCount * 1000) / delta);
                fpsDiv.textContent = `FPS: ${fps}`;
                frameCount = 0;
                lastFpsUpdate = now;
            }
        }
        
        function draw(now) {
            if (isOn) {
                const timeSinceLastFrame = now - lastFrameTime;
                const targetInterval = 1000 / targetLoopRate;
                
                if (timeSinceLastFrame >= targetInterval) {
                    const power = Math.max(1, lagPower);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    for(let layer = 0; layer < power; layer++) {
                        const shapesThisLayer = Math.max(1, Math.floor(30 / Math.max(1, power)) * 15);
                        for(let i = 0; i < shapesThisLayer; i++) {
                            const x = Math.random() * canvas.width;
                            const y = Math.random() * canvas.height;
                            const size = Math.random() * 100 + 40;
                            
                            const r = Math.floor(Math.random() * 255);
                            const g = Math.floor(Math.random() * 255);
                            const b = Math.floor(Math.random() * 255);
                            
                            ctx.fillStyle = `rgb(${r},${g},${b})`;
                            
                            const blurSteps = Math.max(1, Math.floor(power / 15));
                            for(let blur = 0; blur < blurSteps; blur++) {
                                ctx.globalAlpha = 0.15 / blurSteps;
                                ctx.beginPath();
                                
                                if(layer % 3 === 0) {
                                    for(let points = 0; points < 30; points++) {
                                        const angle = (points / 30) * Math.PI * 2;
                                        const xOffset = Math.cos(angle) * size;
                                        const yOffset = Math.sin(angle) * size;
                                        if(points === 0) {
                                            ctx.moveTo(x + xOffset, y + yOffset);
                                        } else {
                                            ctx.lineTo(x + xOffset, y + yOffset);
                                        }
                                    }
                                } else if(layer % 3 === 1) {
                                    ctx.rect(x - size/2, y - size/2, size, size);
                                } else {
                                    for(let c = 0; c < 5; c++) {
                                        ctx.arc(x + Math.sin(c)*15, y + Math.cos(c)*15, size/2, 0, Math.PI*2);
                                    }
                                }
                                
                                ctx.fill();
                                
                                ctx.translate(
                                    Math.sin(layer + i) * 5, 
                                    Math.cos(layer + i) * 5
                                );
                                ctx.rotate(Math.sin(layer + i) * 0.05);
                            }
                            
                            ctx.setTransform(1, 0, 0, 1, 0, 0);
                        }
                    }
                    
                    lastFrameTime = now;
                }
            }
            
            updateFPS();
            animationFrame = requestAnimationFrame(draw);
        }
        
        function updatePower() {
            const val = parseInt(powerInput.value);
            if(!isNaN(val) && val > 0) {
                lagPower = val;
            } else if (!isNaN(val) && val <= 0) {
                lagPower = 1;
                powerInput.value = 1;
            }
        }
        
        function updateLoopRate() {
            const val = parseInt(loopRateInput.value);
            if(!isNaN(val) && val > 0) {
                targetLoopRate = val;
            } else if (!isNaN(val) && val <= 0) {
                targetLoopRate = 1;
                loopRateInput.value = 1;
            }
        }
        
        enterBtn.addEventListener('click', updatePower);
        setRateBtn.addEventListener('click', updateLoopRate);
        
        powerInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') updatePower();
        });
        
        loopRateInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') updateLoopRate();
        });
        
        switchEl.addEventListener('click', () => {
            isOn = !isOn;
            if (isOn) {
                switchEl.classList.add('on');
                lastFrameTime = performance.now();
            } else {
                switchEl.classList.remove('on');
            }
        });
        
        powerInput.value = 1000;
        lagPower = 1000;
        loopRateInput.value = 90;
        targetLoopRate = 90;
        
        draw();
    </script>
</body>
</html>
